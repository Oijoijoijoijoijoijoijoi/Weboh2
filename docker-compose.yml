services:
  mysql-db:
    image: mysql:latest
    container_name: prisma-mysql-cms
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DOCKER_DB_PASS}
      MYSQL_DATABASE: ${DOCKER_DB_NAME}
    ports:
      - "${HOST_DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: